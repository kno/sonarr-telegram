version: '3.9'
services:
  app:
    build: .
    image: sonarr-telegram:dev
    environment:
      - NODE_ENV=development
      - PORT=3000
      - REDIS_URL=redis://redis:6379
      # - SONARR_URL=
      # - SONARR_API_KEY=
      # - TELEGRAM_API_ID=
      # - TELEGRAM_API_HASH=
      # - TELEGRAM_ENC_SECRET=
      # - TELEGRAM_ALLOWED_CHANNELS=
    ports:
      - "3000:3000"
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

