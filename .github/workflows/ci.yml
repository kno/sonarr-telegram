name: CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:11
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: sonarr_telegram
          MARIADB_USER: app
          MARIADB_PASSWORD: app
        ports:
          - 3306:3306
        # Ensure DB is ready
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=5s --health-timeout=5s --health-retries=20
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - name: Install deps
        run: bun install --frozen-lockfile || bun install
      - name: Typecheck
        run: bun run typecheck
      - name: Lint
        run: bun run lint
      - name: Build
        run: bun run build
      - name: Migrate DB
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USER: app
          DB_PASSWORD: app
          DB_NAME: sonarr_telegram
        run: bun run db:migrate
      - name: Tests
        run: bun run test -- --ci
  docker:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
